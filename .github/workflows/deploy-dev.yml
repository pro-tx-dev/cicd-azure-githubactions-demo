name: Deploy Dev

on:
  push:
    branches:
      - dev

jobs:
  build-backend:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore backend dependencies
        run: dotnet restore backend/DemoApi/DemoApi.csproj

      - name: Build backend
        run: dotnet build backend/DemoApi/DemoApi.csproj --configuration Release --no-restore

      - name: Publish backend
        run: dotnet publish backend/DemoApi/DemoApi.csproj -c Release -o backend-publish

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dev
          path: backend-publish

  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-backend
    environment: dev

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-dev
          path: backend-publish

      - name: Deploy backend to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_BACKEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: backend-publish

  build-frontend:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: |
          cd frontend/Mark-1
          npm ci

      - name: Build frontend
        run: |
          cd frontend/Mark-1
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dev
          path: frontend/Mark-1/build

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: build-frontend
    environment: dev

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dev
          path: frontend-build

      - name: Deploy frontend to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_FRONTEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_FRONTEND_PUBLISH_PROFILE }}
          package: frontend-build